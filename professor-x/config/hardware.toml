[hardware]
vram_gb = 12
ram_gb = 32
gpu = "rtx3060"

[model]
# qwen3:8b is the primary — it fits the 3060's 12GB VRAM and IS what the
# binary runs (DEFAULT_MODEL in ollama.rs). The thesis is small-model +
# great-harness, so this is on-message, not a compromise. NOTE: llama4:scout
# (109B MoE, ~55GB quantized) does NOT fit a 12GB GPU — do not use it here.
primary  = "qwen3:8b-q4_k_m"     # 5.2GB VRAM, ~42 tok/s, 32K ctx, thinking mode
upgrade  = "qwen3:14b-q4_k_m"    # ~8.5GB VRAM if more headroom is wanted
embed    = "nomic-embed-text"     # 768-dim, CPU-only, ~274MB
inference = "ollama"
ollama_url = "http://localhost:11434"

[compute]
daily_hours = 7
max_parallel_tools = 3
context_window = 32768
evolution_cycle_hours = 1

[budget]
# Token budgets per task type — LCAP defaults, updated by UCB1 after round 10
tool_use_ceiling = 8192
planning_ceiling = 16384
self_correction_ceiling = 12288
research_ceiling = 24576
default_ceiling = 12288
