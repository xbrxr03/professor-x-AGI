name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs when a new commit is pushed to the same branch/PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: 1

jobs:
  check:
    name: cargo check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: professor-x
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            professor-x/target
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('professor-x/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-check-
      - name: cargo check
        run: cargo check --all-targets

  test:
    name: cargo test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: professor-x
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            professor-x/target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('professor-x/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-
      - name: cargo test
        # Run unit tests only. The integration suite that depends on Ollama
        # is excluded — Ollama is not available on the GitHub runner.
        run: cargo test --lib --bins

  fmt:
    name: cargo fmt --check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: professor-x
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable + rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        # Format check is advisory-only for now: report drift without
        # blocking the merge. Tighten to a real gate once existing code is
        # rustfmt-clean.
        continue-on-error: true
        run: cargo fmt --all -- --check
